name: Lint Code

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  biome:
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:unicode
      - run: npm run lint
      - run: npm run lint:boundaries
